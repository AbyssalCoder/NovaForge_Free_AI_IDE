services:
  - type: web
    name: novaforge-api
    runtime: node
    region: oregon
    plan: free
    rootDir: services/api-node
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://codeabyss.vercel.app,https://web-cyan-psi-exrofqp3g8.vercel.app
      - key: DATABASE_URL
        value: postgresql://postgres:AOsdlQAWyW4ETUoA@db.nnivlxbtuovxytwleotf.supabase.co:5432/postgres
      - key: NTFY_TOPIC
        value: codeabyss-admin-alerts
      - key: OPENROUTER_API_KEYS
        sync: false
    healthCheckPath: /health
